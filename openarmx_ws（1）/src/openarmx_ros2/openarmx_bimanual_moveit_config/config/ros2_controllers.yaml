# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_gripper_controller:
      type: position_controllers/GripperActionController

    right_gripper_controller:
      type: position_controllers/GripperActionController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarmx_left_joint1
      - openarmx_left_joint2
      - openarmx_left_joint3
      - openarmx_left_joint4
      - openarmx_left_joint5
      - openarmx_left_joint6
      - openarmx_left_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
      - effort

right_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarmx_right_joint1
      - openarmx_right_joint2
      - openarmx_right_joint3
      - openarmx_right_joint4
      - openarmx_right_joint5
      - openarmx_right_joint6
      - openarmx_right_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
      - effort

left_gripper_controller:
  ros__parameters:
    joints:
      - openarmx_left_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position

right_gripper_controller:
  ros__parameters:
    joints:
      - openarmx_right_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position