  test_motor_warning: |
    安全提示：
    1. 请务必在确保电机安装牢固且无人员靠近的情况下进行测试。
    2. 初次测试时，请使用较小的位置、速度、扭矩、KP、KD值(小于最大值的10%)，避免电机突然高速运转。
    3. 请勿超过电机的最大参数限制，以防止损坏电机或引发安全事故。
    4. 测试过程中如发现异常情况，请立即停止测试并检查设备状态。
    5. 使用本测试工具即表示您已了解并接受可能的安全风险。
    6. 设备启动时，操作人员须将手悬停在紧急停止按钮上方；如遇突发情况，应立即按下急停按钮。

